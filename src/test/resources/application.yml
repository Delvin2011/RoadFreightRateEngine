spring:
  datasource:
    url: jdbc:h2:mem:itemsdb;MODE=MSSQLServer
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

springdoc:
  swagger-ui:
    enabled: false
